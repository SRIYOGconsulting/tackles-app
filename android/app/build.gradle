apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

/**
 * React Native configuration
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Enable Proguard for smaller + faster release builds
 */
def enableProguardInReleaseBuilds = true

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

/**
 * 🔥 FORCE ENABLE HERMES (IMPORTANT FOR PERFORMANCE)
 */
project.ext.react = [
    enableHermes: true
]

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.pracas.tackles"

    defaultConfig {
        applicationId "com.pracas.tackles"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.0.2"

        resValue "string", "AIRTABLE_API_KEY", (project.env.get("AIRTABLE_API_KEY") ?: "")
    }

    signingConfigs {
        release {
            storeFile file(MYAPP_UPLOAD_STORE_FILE)
            storePassword MYAPP_UPLOAD_STORE_PASSWORD
            keyAlias MYAPP_UPLOAD_KEY_ALIAS
            keyPassword MYAPP_UPLOAD_KEY_PASSWORD
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.release

            // 🔥 PERFORMANCE OPTIMIZATION
            minifyEnabled true
            shrinkResources true

            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // 🔥 ALWAYS USE HERMES (FASTER JS ENGINE)
    implementation("com.facebook.react:hermes-android")

    // Your native dependency
    implementation project(':react-native-linear-gradient')
}
